services:
  chat:
    build:
      context: .
      target: final
    command: ["/app/entrypoints/start.sh"]
    container_name: chat
    restart: unless-stopped
    depends_on:
      chat_mongo:
        condition: service_started
    env_file:
      - ./.env.example
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 5s

  chat_mongo:
    image: mongo:7
    container_name: chat_mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - ~/apps/mongo-chat:/data/db
